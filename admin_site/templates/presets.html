{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Пресеты вариантов</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPresetModal">
    <i class="bi bi-plus-lg"></i> Добавить пресет
  </button>
</div>

<table class="table table-striped table-hover">
  <thead>
    <tr><th>Название</th><th style="width:200px">Действия</th></tr>
  </thead>
  <tbody>
    {% for p in presets %}
    <tr>
      <td>{{ p.name_ru }}</td>
      <td>
        <a href="/presets/{{ p.id }}/variants" class="btn btn-sm btn-outline-success"><i class="bi bi-list-ul"></i> Варианты</a>
        <a href="/presets/delete/{{ p.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить пресет и все его варианты?')"><i class="bi bi-trash"></i></a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<!-- Модалка добавления -->
<div class="modal fade" id="addPresetModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" method="post" action="/presets/add">
      <div class="modal-header">
        <h5 class="modal-title">Новый пресет</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <input name="name_ru" class="form-control" placeholder="Название (русский)" required>
        </div>
        <div class="mb-3">
          <input name="name_en" class="form-control" placeholder="Name (English)">
        </div>
        <div class="mb-3">
          <input name="name_ro" class="form-control" placeholder="Nume (Română)">
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Создать</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
