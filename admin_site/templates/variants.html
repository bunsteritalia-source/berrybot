{% extends "layout.html" %}
{% block content %}
<h2>Варианты товара "{{ product.name_ru }}"</h2>
<form method="post" action="/products/{{ product.id }}/variants/add" class="row g-2 mb-4">
  <div class="col-md-2">
    <input name="name_ru" class="form-control" placeholder="Название RU" required>
  </div>
  <div class="col-md-2">
    <input name="name_en" class="form-control" placeholder="Name EN">
  </div>
  <div class="col-md-2">
    <input name="name_ro" class="form-control" placeholder="Nume RO">
  </div>
  <div class="col-md-2">
    <input name="price" type="number" class="form-control" placeholder="Цена" required>
  </div>
  <div class="col-md-2">
    <button type="submit" class="btn btn-success"><i class="bi bi-plus-circle"></i> Добавить</button>
  </div>
</form>
<table class="table table-striped">
  <thead><tr><th>Название</th><th>Цена</th><th>Действия</th></tr></thead>
  <tbody>
    {% for v in variants %}
    <tr>
      <td>{{ v.name_ru }}</td>
      <td>{{ v.price }} MDL</td>
      <td><a href="/variants/delete/{{ v.id }}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<a href="/products" class="btn btn-outline-secondary">Назад к товарам</a>
{% endblock %}
