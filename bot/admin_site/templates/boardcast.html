<!DOCTYPE html>
<html>
<head><title>Рассылка</title></head>
<body>
  <h2>Рассылка всем пользователям</h2>
  {% if success %}<p style="color:green">Рассылка запущена!</p>{% endif %}
  <form method="post" enctype="multipart/form-data">
    <textarea name="text_ru" placeholder="Текст на русском"></textarea><br>
    <textarea name="text_en" placeholder="Text in English"></textarea><br>
    <textarea name="text_ro" placeholder="Text în română"></textarea><br>
    <input type="file" name="photo"><br>
    <button type="submit">Отправить</button>
  </form>
  <a href="/">Назад</a>
</body>
</html>
