{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Администраторы</h2>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAdminModal">
    <i class="bi bi-person-plus"></i> Добавить администратора
  </button>
</div>

<table class="table table-striped table-hover align-middle">
  <thead>
    <tr>
      <th>ID</th>
      <th>Логин</th>
      <th>Telegram ID</th>
      <th>Уведомления о заказах</th>
      <th style="width: 120px;">Действия</th>
    </tr>
  </thead>
  <tbody>
    {% for a in admins %}
    <tr>
      <td>{{ a.id }}</td>
      <td>{{ a.username }}</td>
      <td>{{ a.telegram_id or '—' }}</td>
      <td>
        {% if a.notify_orders %}
          <span class="badge bg-success">Вкл</span>
        {% else %}
          <span class="badge bg-secondary">Выкл</span>
        {% endif %}
      </td>
      <td>
        <a href="/admins/toggle_notify/{{ a.id }}" class="btn btn-sm btn-outline-warning" title="Переключить уведомления">
          <i class="bi bi-bell"></i>
        </a>
        <a href="/admins/delete/{{ a.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить администратора?')">
          <i class="bi bi-trash"></i>
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<!-- Модальное окно добавления -->
<div class="modal fade" id="addAdminModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" method="post" action="/admins/add">
      <div class="modal-header">
        <h5 class="modal-title">Новый администратор</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <input name="username" class="form-control" placeholder="Логин" required>
        </div>
        <div class="mb-3">
          <input name="password" type="password" class="form-control" placeholder="Пароль" required>
        </div>
        <div class="mb-3">
          <input name="telegram_id" type="number" class="form-control" placeholder="Telegram ID (опционально)">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="notify_orders" id="notifyOrders">
          <label class="form-check-label" for="notifyOrders">Получать уведомления о заказах</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Добавить</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
