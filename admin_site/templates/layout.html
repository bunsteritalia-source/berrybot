<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berry Bouquet Admin</title>
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { padding-top: 70px; }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
      transition: background 0.3s;
    }
    .drop-zone.dragover { background: #e9f5ff; }
    .preview-image {
      max-width: 150px;
      max-height: 150px;
      margin: 5px;
      border-radius: 8px;
      object-fit: cover;
    }
    .theme-toggle { cursor: pointer; }
    /* Анимации */
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <!-- Навигация -->
  <nav class="navbar navbar-expand-lg fixed-top bg-body-tertiary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">🍓 Berry Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/products">Товары</a></li>
          <li class="nav-item"><a class="nav-link" href="/categories">Категории</a></li>
          <li class="nav-item"><a class="nav-link" href="/admins">Админы</a></li>
          <li class="nav-item"><a class="nav-link" href="/settings">Настройки</a></li>
          <li class="nav-item"><a class="nav-link" href="/broadcast">Рассылка</a></li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="theme-toggle me-3" id="themeToggle" title="Переключить тему">
            <i class="bi bi-moon-stars-fill"></i>
          </span>
          <a href="/logout" class="btn btn-outline-danger btn-sm">Выйти</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Основной контент -->
  <main class="container fade-in">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS и переключатель темы -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Переключение темы
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const icon = themeToggle.querySelector('i');

    function setTheme(theme) {
      html.setAttribute('data-bs-theme', theme);
      localStorage.setItem('berry_theme', theme);
      icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
    }

    const savedTheme = localStorage.getItem('berry_theme') || 'light';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const current = html.getAttribute('data-bs-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Drag-and-drop для всех зон загрузки фото
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.drop-zone').forEach(zone => {
        const input = zone.querySelector('input[type="file"]');
        if (!input) return;

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
          zone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
          });
        });

        ['dragenter', 'dragover'].forEach(eventName => {
          zone.addEventListener(eventName, () => zone.classList.add('dragover'));
        });

        ['dragleave', 'drop'].forEach(eventName => {
          zone.addEventListener(eventName, () => zone.classList.remove('dragover'));
        });

        zone.addEventListener('drop', e => {
          const files = e.dataTransfer.files;
          if (files.length) {
            input.files = files;
            // Показать превью
            const preview = document.getElementById(input.dataset.previewId);
            if (preview) {
              preview.innerHTML = '';
              Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                  const img = document.createElement('img');
                  img.src = e.target.result;
                  img.className = 'preview-image';
                  preview.appendChild(img);
                };
                reader.readAsDataURL(file);
              });
            }
          }
        });
      });
    });
  </script>
</body>
</html>
