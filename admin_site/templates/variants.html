{% extends "layout.html" %}
{% block content %}
<h2>Варианты товара "{{ product.name_ru }}"</h2>
<form method="post" action="/products/{{ product.id }}/variants/add" class="row g-3 mb-4">
  <div class="col-md-3">
    <label class="form-label">Количество (шт)</label>
    <input name="quantity" type="number" class="form-control" placeholder="25" required>
  </div>
  <div class="col-md-3">
    <label class="form-label">Цена (MDL)</label>
    <input name="price" type="number" class="form-control" placeholder="500" required>
  </div>
  <div class="col-md-3">
    <label>&nbsp;</label>
    <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-circle"></i> Добавить</button>
  </div>
</form>

<table class="table table-striped">
  <thead><tr><th>Кол-во</th><th>Цена</th><th></th></tr></thead>
  <tbody>
    {% for v in variants %}
    <tr>
      <td>{{ v.quantity }} шт</td>
      <td>{{ v.price }} MDL</td>
      <td><a href="/variants/delete/{{ v.id }}" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<a href="/products" class="btn btn-outline-secondary">Назад к товарам</a>
{% endblock %}
